## Web UI will be available on port 55234 once deployed ##

services:
  ntp-dashboard:
    build:
      context: .
      args:
        INSTALL_GPSD_CLIENTS: "false" # Set to true only if you need local gpspipe inside the container.
    container_name: ntp-dashboard
    network_mode: "host" # Allows the container to query host chrony; local gpspipe support is optional.
    environment:
      - LOG_LEVEL=INFO # Standard runtime logs (recommended default for normal operation)
        # Supported levels:
        # - DEBUG    # Most verbose (for troubleshooting only; may enable Flask debug mode)
        # - INFO     # Standard runtime logs (recommended default)
        # - WARNING  # Warnings and errors only
        # - ERROR    # Errors only
        # - CRITICAL # Critical failures only
    volumes:
      - ./data:/app/data # Persists UI settings
      - /run/chrony:/run/chrony # Needed for local-only deployments to access chrony correctly and gather data
      - /var/run/chrony:/var/run/chrony # Needed for local-only deployments to access chrony correctly and gather data
    restart: unless-stopped
