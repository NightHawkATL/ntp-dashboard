## Web UI will be available on port 55234 once deployed ##

services:
  ntp-dashboard:
    build:
      context: .
      args:
        INSTALL_GPSD_CLIENTS: "false" # Set to true only if you need local gpspipe inside the container.
    container_name: ntp-dashboard
    network_mode: "host" # Allows the container to query host chrony; local gpspipe support is optional.
    environment:
      - LOG_LEVEL=DEBUG # Default level for normal operation
        # Supported levels:
        # - DEBUG    # Most verbose (for troubleshooting)
        # - INFO     # Standard runtime logs (recommended default)
        # - WARNING  # Warnings and errors only
        # - ERROR    # Errors only
        # - CRITICAL # Critical failures only
    volumes:
      - ./data:/app/data # Persists UI settings
    restart: unless-stopped
