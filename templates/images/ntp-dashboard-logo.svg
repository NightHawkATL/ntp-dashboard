<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1A2751" />
      <stop offset="100%" stop-color="#0A1128" />
    </radialGradient>
    <!-- Drop Shadow for Depth -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity="0.7"/>
    </filter>
  </defs>

  <!-- LAYER 1: Background -->
  <g id="Layer_Background">
    <rect width="1200" height="1200" fill="url(#bgGrad)"/>
  </g>

  <!-- LAYER 2: Tech Dashboard Grid -->
  <g id="Layer_Dotted_Ring">
    <circle cx="600" cy="600" r="350" fill="none" stroke="#3A506B" stroke-width="6" stroke-dasharray="10 25"/>
  </g>

  <!-- LAYER 3: Outer Clock Face -->
  <g id="Layer_Clock_Face">
    <circle cx="600" cy="600" r="450" fill="none" stroke="#00A8E8" stroke-width="25"/>
    
    <!-- Major Time Ticks -->
    <line x1="600" y1="110" x2="600" y2="190" stroke="#00A8E8" stroke-width="25" stroke-linecap="round"/>
    <line x1="1010" y1="600" x2="1090" y2="600" stroke="#00A8E8" stroke-width="25" stroke-linecap="round"/>
    <line x1="600" y1="1010" x2="600" y2="1090" stroke="#00A8E8" stroke-width="25" stroke-linecap="round"/>
    <line x1="110" y1="600" x2="190" y2="600" stroke="#00A8E8" stroke-width="25" stroke-linecap="round"/>
    
    <!-- Minor Time Ticks -->
    <circle cx="825" cy="210" r="10" fill="#00A8E8"/>
    <circle cx="990" cy="375" r="10" fill="#00A8E8"/>
    <circle cx="990" cy="825" r="10" fill="#00A8E8"/>
    <circle cx="825" cy="990" r="10" fill="#00A8E8"/>
    <circle cx="375" cy="990" r="10" fill="#00A8E8"/>
    <circle cx="210" cy="825" r="10" fill="#00A8E8"/>
    <circle cx="210" cy="375" r="10" fill="#00A8E8"/>
    <circle cx="375" cy="210" r="10" fill="#00A8E8"/>
  </g>

  <!-- LAYER 4: Server Stack -->
  <g id="Layer_Servers" filter="url(#shadow)">
    <!-- Top Server -->
    <rect x="380" y="430" width="440" height="90" rx="20" fill="#1C2541" stroke="#3A506B" stroke-width="8"/>
    <circle cx="430" cy="475" r="12" fill="#00FFD1"/>
    <circle cx="480" cy="475" r="12" fill="#00FFD1"/>
    <rect x="530" y="470" width="250" height="10" rx="5" fill="#2B3A5A"/>

    <!-- Middle Server -->
    <rect x="380" y="555" width="440" height="90" rx="20" fill="#1C2541" stroke="#3A506B" stroke-width="8"/>
    <circle cx="430" cy="600" r="12" fill="#00FFD1"/>
    <circle cx="480" cy="600" r="12" fill="#00A8E8"/>
    <rect x="530" y="595" width="250" height="10" rx="5" fill="#2B3A5A"/>

    <!-- Bottom Server -->
    <rect x="380" y="680" width="440" height="90" rx="20" fill="#1C2541" stroke="#3A506B" stroke-width="8"/>
    <circle cx="430" cy="725" r="12" fill="#00FFD1"/>
    <circle cx="480" cy="725" r="12" fill="#00FFD1"/>
    <rect x="530" y="720" width="250" height="10" rx="5" fill="#2B3A5A"/>
  </g>

  <!-- LAYER 5: Clock Hands -->
  <g id="Layer_Clock_Hands" filter="url(#shadow)">
    <!-- Hour Hand -->
    <line x1="600" y1="600" x2="450" y2="450" stroke="#00FFD1" stroke-width="35" stroke-linecap="round"/>
    <!-- Minute Hand -->
    <line x1="600" y1="600" x2="780" y2="280" stroke="#00FFD1" stroke-width="20" stroke-linecap="round"/>
    <!-- Center Pin -->
    <circle cx="600" cy="600" r="40" fill="#0A1128" stroke="#00FFD1" stroke-width="12"/>
    <circle cx="600" cy="600" r="15" fill="#00FFD1"/>
  </g>
</svg>