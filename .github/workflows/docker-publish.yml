name: Build and Publish Docker Image

# This tells GitHub to run this script whenever you push to the "main" branch, 
# or whenever you publish a new Release/Tag (like v1.0.0)
on:
  push:
    branches: [ "main" ]
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Needed to push to GitHub Container Registry

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sets up QEMU which allows GitHub to build ARM64 images for your Raspberry Pi
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # This step automatically tags your image (e.g., 'latest' for main branch, or 'v1.0.0' for releases)
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME }}/ntp-dashboard
            ghcr.io/${{ github.repository }}
          tags: |
            # 1. Automatically tag with the version (e.g., v0.0.4) when you publish a Release
            type=semver,pattern={{version}}
            # 2. Always tag the main branch as 'latest' when you push code
            type=raw,value=latest,enable={{is_default_branch}}

      # The actual build command
      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
